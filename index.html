<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMP Center — Updated Workflow</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --surface:#ffffff;
      --surface-dark:#0f1722;
      --surface-dark-2:#162233;
      --text:#142334;
      --muted:#75859a;
      --line:#d9e3ef;
      --primary:#2257d8;
      --primary-2:#3c73f0;
      --primary-soft:#eef4ff;
      --success:#0c9c68;
      --warning:#c8881c;
      --danger:#cd5555;
      --shadow-xl:0 30px 80px rgba(17,28,42,.10);
      --shadow-lg:0 18px 50px rgba(17,28,42,.08);
      --shadow-md:0 10px 30px rgba(17,28,42,.10);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:"Segoe UI",Tahoma,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f8fafc 0%, #f5f7fb 100%);
    }
    button,input,select,textarea{font:inherit}
    a{text-decoration:none;color:inherit}
    .hidden{display:none!important}
    .page{min-height:100vh}

    .login{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:24px;
      background:linear-gradient(135deg,#0f1722 0%,#1f4068 100%);
      overflow:hidden;
    }
    .login-card{
      width:100%;
      max-width:500px;
      background:rgba(10,18,33,.68);
      border:1px solid rgba(255,255,255,.18);
      border-radius:32px;
      padding:30px;
      box-shadow:0 30px 80px rgba(0,0,0,.35);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }
    .login-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:22px}
    .login-head h3{margin:0;font-size:34px;font-weight:800;color:#fff}
    .login-head p{margin:8px 0 0;color:rgba(255,255,255,.78);line-height:1.8;font-size:14px}
    .status{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);font-size:13px;font-weight:700;color:#fff;white-space:nowrap}

    .field{margin-bottom:14px}
    .field label{display:block;margin-bottom:8px;font-size:13px;font-weight:800;color:#24384f}
    .login-card .field label,.login-card .remember,.login-card .login-foot{color:#fff}

    input,select,textarea{
      width:100%;padding:15px 16px;border-radius:18px;border:1px solid #dde6ef;background:#fbfcfe;color:var(--text);outline:none;transition:.18s ease;
    }
    input:focus,select:focus,textarea:focus{background:#fff;border-color:rgba(34,87,216,.40);box-shadow:0 0 0 4px rgba(34,87,216,.08)}
    .login-card input,.login-card select,.login-card textarea{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.10);color:#fff}
    .login-card input:focus,.login-card select:focus,.login-card textarea:focus{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.32);box-shadow:0 0 0 4px rgba(255,255,255,.08)}
    .login-card input::placeholder{color:rgba(255,255,255,.62)}
    .login-card select option{color:#142334}
    textarea{min-height:118px;resize:vertical}

    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .quick-users{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .quick{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:12px 8px;text-align:center;cursor:pointer;transition:.18s ease;color:#fff}
    .quick:hover,.quick.active{transform:translateY(-1px);background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.28)}
    .quick b{display:block;font-size:13px;margin-bottom:4px}
    .quick span{font-size:12px;color:rgba(255,255,255,.72)}

    .login-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:8px}
    .remember{display:flex;align-items:center;gap:8px;font-size:13px}
    .remember input{accent-color:var(--primary)}
    .btn{border:none;border-radius:18px;padding:14px 18px;cursor:pointer;font-weight:800;transition:.18s ease}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;box-shadow:0 14px 26px rgba(34,87,216,.18)}
    .btn-soft{background:var(--primary-soft);color:#2857b9}
    .login-card .btn-soft{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.12)}
    .btn-outline{background:#fff;border:1px solid var(--line);color:#2b435f}
    .btn-danger{background:#fff2f2;color:#b94a4a}
    .login-foot{margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.12);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;color:rgba(255,255,255,.72);font-size:13px}

    .app{min-height:100vh;padding:20px;background:#f5f7fb}
    .layout{display:grid;grid-template-columns:294px 1fr;gap:18px;min-height:calc(100vh - 40px)}
    .sidebar{background:linear-gradient(180deg,var(--surface-dark) 0%, var(--surface-dark-2) 100%);color:#fff;border-radius:32px;padding:20px;box-shadow:var(--shadow-lg);position:sticky;top:20px;height:calc(100vh - 40px);overflow:auto}
    .brand{display:flex;align-items:center;gap:16px}
    .brand-mark{width:62px;height:62px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(145deg,#18304e,#0f1b2b);color:#fff;font-size:24px;font-weight:800}
    .sidebar .brand{padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sidebar .brand h1{margin:0;font-size:22px;color:#fff}
    .sidebar .brand p{margin:6px 0 0;color:rgba(255,255,255,.62);font-size:14px}
    .nav-title{margin:0 8px 10px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.44)}
    .menu{display:grid;gap:8px}
    .menu button{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 15px;background:transparent;border:1px solid transparent;border-radius:18px;color:rgba(255,255,255,.82);transition:.18s ease}
    .menu button:hover,.menu button.active{background:#fff;color:var(--text)}
    .side-card{margin-top:16px;padding:16px;border-radius:22px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08)}
    .side-card h4{margin:0 0 10px;font-size:15px}
    .side-card p{margin:5px 0;font-size:13px;line-height:1.8;color:rgba(255,255,255,.74)}

    .main{display:grid;gap:16px}
    .topbar{background:#ffffff;border:1px solid #d9e3ef;border-radius:30px;padding:18px 22px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:var(--shadow-md);position:sticky;top:20px;z-index:20}
    .topbar h2{margin:0;font-size:30px;font-weight:800}
    .topbar p{margin:6px 0 0;color:var(--muted)}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap}
    .chip{padding:11px 14px;border-radius:16px;background:#fafcff;border:1px solid var(--line);color:#5d738d;font-size:13px;font-weight:700}
    .chip.clickable{cursor:pointer}

    .hero-dashboard{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}
    .card,.panel{background:#ffffff;border:1px solid #d9e3ef;border-radius:30px;box-shadow:var(--shadow-md)}
    .card{padding:24px}
    .panel{padding:20px}
    .hero-main h3{margin:0;font-size:34px;line-height:1.24;font-weight:800}
    .hero-main p{margin:12px 0 18px;color:var(--muted);line-height:1.95;max-width:740px}
    .hero-buttons{display:flex;gap:10px;flex-wrap:wrap}
    .schedule{background:linear-gradient(160deg,#173251 0%, #234a70 100%);color:#fff;position:relative;overflow:hidden}
    .schedule h4{margin:0 0 6px;font-size:20px;font-weight:800}
    .schedule p{margin:0 0 14px;color:rgba(255,255,255,.76);line-height:1.8}
    .timeline{display:grid;gap:10px}
    .time-item{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:12px 14px}
    .time-item strong{display:block;font-size:14px}
    .time-item span{font-size:12px;color:rgba(255,255,255,.76)}

    .section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 2px 10px}
    .section-title h3{margin:0;font-size:21px;font-weight:800}
    .section-title span{color:#7789a1;font-size:13px}

    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .stat{padding:18px}
    .stat .label{color:#7b8ca2;font-size:13px;margin-bottom:10px}
    .stat .value{font-size:30px;font-weight:800;margin-bottom:10px}
    .kpi{display:inline-flex;gap:6px;padding:7px 10px;border-radius:999px;background:var(--primary-soft);color:#2956b8;font-size:12px;font-weight:800}

    .split,.forms{display:grid;gap:14px}
    .split{grid-template-columns:1.15fr .85fr}
    .forms{grid-template-columns:1fr 1fr}
    .mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .mini{border:1px solid #d9e3ef;background:#ffffff;border-radius:22px;padding:16px}
    .mini .label{color:#7b8ca2;font-size:13px;margin-bottom:8px}
    .mini .value{font-size:24px;font-weight:800}
    .alerts{display:grid;gap:10px}
    .alert{padding:14px;border-radius:18px;border:1px solid #f0dfc3;background:linear-gradient(180deg,#fffaf2,#fff7ec);color:#b17318;font-size:14px;line-height:1.8}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .search{max-width:320px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .full{grid-column:1/-1}
    .table-wrap{overflow-x:auto;border:1px solid #cfdceb;border-radius:20px;background:#ffffff}
    table{width:100%;min-width:640px;border-collapse:collapse;font-size:14px}
    th,td{text-align:right;padding:14px 12px;border-bottom:1px solid #edf2f8;white-space:nowrap;vertical-align:top}
    th{background:#f9fbff;color:#7c8ea4;font-size:12px;font-weight:800}
    tbody tr:hover{background:#fbfdff}
    .note{margin-top:14px;padding:14px;border-radius:18px;background:#f8fbff;border:1px solid var(--line);color:#28405d;line-height:1.8;font-size:14px}
    .badge{display:inline-flex;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:800;justify-content:center;align-items:center;min-width:62px}
    .warn{background:#fff3e3;color:#bd6d09}
    .ok{background:#ebfbf4;color:#128255}
    .draft{background:#eef4ff;color:#2257d8}
    .danger{background:#fff1f1;color:#b94343}

    .toast-wrap{position:fixed;left:20px;bottom:20px;display:grid;gap:10px;z-index:1000}
    .toast{min-width:270px;max-width:360px;color:#fff;padding:14px 16px;border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,.16)}
    .toast.success{background:#0d7150}
    .toast.warn{background:#956516}
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,30,45,.34);display:flex;align-items:center;justify-content:center;z-index:999}
    .modal{width:min(520px,92vw);background:#fff;color:var(--text);border-radius:28px;padding:24px;box-shadow:0 30px 70px rgba(21,35,50,.16)}
    .modal h3{margin:0 0 10px}.modal p{margin:0 0 18px;color:var(--muted);line-height:1.8}.modal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

    @media (max-width:1260px){.layout,.hero-dashboard,.split,.forms{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.sidebar{position:relative;height:auto;top:0}.topbar{top:10px}}
    @media (max-width:760px){.login{padding:16px}.login-card{padding:22px;border-radius:24px}.login-head{flex-direction:column}.login-head h3{font-size:30px}.row,.quick-users,.stats,.mini-grid,.form-grid{grid-template-columns:1fr}.topbar h2{font-size:24px}}
  </style>
</head>

</body>
</html>
